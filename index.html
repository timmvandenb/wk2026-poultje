  const fetchLive=async()=>{

      try{const r=await fetch(url,{headers});if(r.ok)return r;}catch(_){}
      return fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url),{headers});
    };
    try{
      const [sRes,mRes,stRes]=await Promise.all([
        pfetch(`${BASE}/competitions/WC/scorers?season=2026`),

        const md=await mRes.json();

        const cards={},goals={};
        matches.forEach(m=>{
          [m.homeTeam,m.awayTeam].forEach(t=>{if(!t?.name)return;const id=NAT_MAP[t.name]||t.name;if(!cards[id])cards[id]=0;if(!goals[id])goals[id]={gf:0,ga:0};});
          (m.bookings||[]).forEach(b=>{const id=NAT_MAP[b.team?.name]||b.team?.name;if(id)cards[id]=(cards[id]||0)+(b.card==="RED_CARD"?2:1);});

            const hi=NAT_MAP[m.homeTeam?.name]||m.homeTeam?.name;
            const ai=NAT_MAP[m.awayTeam?.name]||m.awayTeam?.name;
            const hg=m.score.fullTime.home||0,ag=m.score.fullTime.away||0;
            if(hi){goals[hi].gf+=hg;goals[hi].ga+=ag;}
            if(ai){goals[ai].gf+=ag;goals[ai].ga+=hg;}
          }
        });
        const sorted=Object.entries(cards).sort((a,b)=>b[1]-a[1]);
        if(sorted.length&&sorted[0][1]>0){live.mostCardsTeamId=sorted[0][0];live.mostCardsCount=sorted[0][1];}
        else{live.mostCardsTeamId=null;live.mostCardsCount=0;}
        /* update teamStats */
        const newStats={};
        Object.keys({...cards,...goals}).forEach(id=>{newStats[id]={gf:goals[id]?.gf||0,ga:goals[id]?.ga||0,cards:cards[id]||0};});
        w('teamStats',newStats);
        /* store simplified match list for Uitslag page */
        const stageNames={GROUP_STAGE:"Groepsfase",ROUND_OF_32:"R32",ROUND_OF_16:"R16",QUARTER_FINALS:"Kwartfinale",SEMI_FINALS:"Halve finale",FINAL:"Finale"};
        live.matchList=matches.slice(0,200).map(m=>({
          id:m.id,
          date:m.utcDate?.slice(0,10)||"",
          time:m.utcDate?.slice(11,16)||"",
          stage:stageNames[m.stage]||m.stage,
          group:m.group?.replace("GROUP_","")||"",
          status:m.status,
          venue:m.venue||"",
          home:NAT_MAP[m.homeTeam?.name]||"",
          away:NAT_MAP[m.awayTeam?.name]||"",
          homeName:m.homeTeam?.name||"",
          awayName:m.awayTeam?.name||"",
          hs:m.score?.fullTime?.home??null,
          as:m.score?.fullTime?.away??null,
          goals:(m.goals||[]).map(g=>({min:g.minute,scorer:g.scorer?.name||"",teamId:NAT_MAP[g.team?.name]||""})),
          cards:(m.bookings||[]).map(b=>({min:b.minute,player:b.player?.name||"",teamId:NAT_MAP[b.team?.name]||"",type:b.card==="RED_CARD"?"R":"Y"})),
        }));
        /* group standings */
        const newRes={...res};
        const finished=matches.filter(m=>m.status==="FINISHED");
        if(stRes.ok){
          const stad=await stRes.json();
          const newStandings={};
          const r32teams=[];
          (stad.standings||[]).forEach(grp=>{
            if(grp.type==="TOTAL"){
              const letter=(grp.group||"").replace("GROUP_","");
              if(!letter||letter.length!==1||!/^[A-L]$/.test(letter)) return;
              newStandings[letter]=(grp.table||[]).map(row=>({
                id:NAT_MAP[row.team?.name]||row.team?.name,
                p:row.playedGames,w:row.won,d:row.draw,l:row.lost,
                gf:row.goalsFor,ga:row.goalsAgainst,pts:row.points
              }));

            }
          });
          live.groupStandings=newStandings;
          /* top 2 per group */
          if(r32teams.length>0){
            /* best 8 third-place teams */
            const thirds=Object.values(newStandings)
              .map(rows=>rows[2]).filter(Boolean)
              .sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(b.gf-b.ga)!==(a.gf-a.ga)?(b.gf-b.ga)-(a.gf-a.ga):b.gf-a.gf)
