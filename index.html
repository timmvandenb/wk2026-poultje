<script type="text/babel">

/* ══════════════════════════════════════════════════

const FIREBASE_CONFIG = {

  authDomain:        "wk2026-poultje.firebaseapp.com",

const FD_KEY = "ef137c6caa954dcb8f757cbf6593dfe7"; // football-data.org gratis token
/* ══════════════════════════════════════════════════ */

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const REF = '/wk2026';

/* ── constants ── */
const GROUPS = {
  A:["mex","rsa","kor","cze"], B:["can","bih","qat","sui"],
  C:["bra","mar","hai","sco"], D:["usa","par","aus","tur"],
  E:["ger","cur","civ","ecu"], F:["ned","jpn","swe","tun"],
  G:["bel","egy","irn","nzl"], H:["esp","cpv","ksa","uru"],
  I:["fra","sen","irq","nor"], J:["arg","dza","aut","jor"],
  K:["por","cod","uzb","col"], L:["eng","cro","gha","pan"],
};
const TEAMS = [
  {id:"mex",name:"Mexico",flag:"🇲🇽"},{id:"rsa",name:"Z-Afrika",flag:"🇿🇦"},
  {id:"kor",name:"Z-Korea",flag:"🇰🇷"},{id:"cze",name:"Tsjechië",flag:"🇨🇿"},
  {id:"can",name:"Canada",flag:"🇨🇦"},{id:"bih",name:"Bosnië-Herz.",flag:"🇧🇦"},
  {id:"qat",name:"Qatar",flag:"🇶🇦"},{id:"sui",name:"Zwitserland",flag:"🇨🇭"},
  {id:"bra",name:"Brazilië",flag:"🇧🇷"},{id:"mar",name:"Marokko",flag:"🇲🇦"},
  {id:"hai",name:"Haïti",flag:"🇭🇹"},{id:"sco",name:"Schotland",flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},
  {id:"usa",name:"VS",flag:"🇺🇸"},{id:"par",name:"Paraguay",flag:"🇵🇾"},
  {id:"aus",name:"Australië",flag:"🇦🇺"},{id:"tur",name:"Turkije",flag:"🇹🇷"},
  {id:"ger",name:"Duitsland",flag:"🇩🇪"},{id:"cur",name:"Curaçao",flag:"🇨🇼"},
  {id:"civ",name:"Ivoorkust",flag:"🇨🇮"},{id:"ecu",name:"Ecuador",flag:"🇪🇨"},
  {id:"ned",name:"Nederland",flag:"🇳🇱"},{id:"jpn",name:"Japan",flag:"🇯🇵"},
  {id:"swe",name:"Zweden",flag:"🇸🇪"},{id:"tun",name:"Tunesië",flag:"🇹🇳"},
  {id:"bel",name:"België",flag:"🇧🇪"},{id:"egy",name:"Egypte",flag:"🇪🇬"},
  {id:"irn",name:"Iran",flag:"🇮🇷"},{id:"nzl",name:"Nieuw-Zeeland",flag:"🇳🇿"},
  {id:"esp",name:"Spanje",flag:"🇪🇸"},{id:"cpv",name:"Kaapverdië",flag:"🇨🇻"},
  {id:"ksa",name:"Saoedi-Arabië",flag:"🇸🇦"},{id:"uru",name:"Uruguay",flag:"🇺🇾"},
  {id:"fra",name:"Frankrijk",flag:"🇫🇷"},{id:"sen",name:"Senegal",flag:"🇸🇳"},
  {id:"irq",name:"Irak",flag:"🇮🇶"},{id:"nor",name:"Noorwegen",flag:"🇳🇴"},
  {id:"arg",name:"Argentinië",flag:"🇦🇷"},{id:"dza",name:"Algerije",flag:"🇩🇿"},
  {id:"aut",name:"Oostenrijk",flag:"🇦🇹"},{id:"jor",name:"Jordanië",flag:"🇯🇴"},
  {id:"por",name:"Portugal",flag:"🇵🇹"},{id:"cod",name:"DR Congo",flag:"🇨🇩"},
  {id:"uzb",name:"Oezbekistan",flag:"🇺🇿"},{id:"col",name:"Colombia",flag:"🇨🇴"},
  {id:"eng",name:"Engeland",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{id:"cro",name:"Kroatië",flag:"🇭🇷"},
  {id:"gha",name:"Ghana",flag:"🇬🇭"},{id:"pan",name:"Panama",flag:"🇵🇦"},
];
const ODDS_RANK = ["esp","fra","eng","arg","bra","por","ger","nor","ned","bel","col","usa","jpn","mar","uru","mex","cro","sui","ecu","sen","kor","aut","can","par","sco","civ","egy","dza","rsa","aus","gha","irn","bih","cze","tur","ksa","pan","irq","qat","hai","nzl","jor","cod","swe","tun","cur","cpv","uzb"];
const BOT3 = ODDS_RANK.slice(45);
const PC = ["#378ADD","#1D9E75","#D85A30"];
const PL = ["#E6F1FB","#E1F5EE","#FAECE7"];
const PD = ["#0C447C","#085041","#4A1B0C"];
const ROUNDS = [
  {key:"r32",label:"Door groepsfase",short:"Groepen",max:32,source:null},
  {key:"r16",label:"Ronde van 32 door",short:"R32",max:16,source:"r32"},
  {key:"qf",label:"Achtste finale door",short:"R16",max:8,source:"r16"},
  {key:"sf",label:"Kwartfinale door",short:"QF",max:4,source:"qf"},
  {key:"final",label:"Halve finale door",short:"SF",max:2,source:"sf"},
  {key:"champion",label:"Wereldkampioen",short:"🏆",max:1,source:"final"},
];
const NAT_MAP = {"France":"fra","Spain":"esp","England":"eng","Argentina":"arg","Brazil":"bra","Portugal":"por","Germany":"ger","Netherlands":"ned","Morocco":"mar","Belgium":"bel","Japan":"jpn","Norway":"nor","Colombia":"col","Uruguay":"uru","Mexico":"mex","Croatia":"cro","Switzerland":"sui","Ecuador":"ecu","Senegal":"sen","South Korea":"kor","Korea Republic":"kor","Austria":"aut","Canada":"can","Paraguay":"par","Scotland":"sco","Ivory Coast":"civ","Côte d'Ivoire":"civ","Egypt":"egy","Australia":"aus","Algeria":"dza","South Africa":"rsa","Ghana":"gha","Iran":"irn","Bosnia and Herzegovina":"bih","Czechia":"cze","Czech Republic":"cze","Turkey":"tur","Türkiye":"tur","Qatar":"qat","Saudi Arabia":"ksa","Panama":"pan","Iraq":"irq","Haiti":"hai","Curaçao":"cur","Congo DR":"cod","DR Congo":"cod","Cape Verde":"cpv","Sweden":"swe","Tunisia":"tun","New Zealand":"nzl","Jordan":"jor","Uzbekistan":"uzb","United States":"usa","USA":"usa"};
const PLAYER_META = [{hl:{start:0,len:3}},{hl:{start:0,len:4}},{hl:{start:2,len:4}}];

const DEF_STATE = {
  names:["TIMas Rosický","OLAVksandr Zinchenko","roBARTo Carlos"],
  picks:{}, draftPhase:"order", phaseStep:0, draftOrder:null,
  lotGroups:[], lotStep:0, lotRevealed:false, orderRevealed:false,
  potPredStep:0,
  sc:{r32:3,r16:6,qf:10,sf:15,final:20,champion:30,worst:-20},
  res:{r32:[],r16:[],qf:[],sf:[],final:[],champion:null,topScorer:null,mostCards:null},
  teamStats:{}, playerPreds:["","",""],
  potPlayer:"", photoVictim:null,
  live:{topScorerName:"",topScorerTeamId:null,topScorerGoals:0,mostCardsTeamId:null,mostCardsCount:0,lastUpdated:null,matchList:[],groupStandings:{}}
};

function App(){
  const [phase,setPhase] = React.useState("setup");
  const [showSc,setShowSc] = React.useState(false);
  const [showTm,setShowTm] = React.useState(false);
  const [showSr,setShowSr] = React.useState(false);
  const [showDs,setShowDs] = React.useState(false);
  const [showStats,setShowStats] = React.useState(false);
  const [apiStatus,setApiStatus] = React.useState(null);
  const [apiLoading,setApiLoading] = React.useState(false);
  const [freeSearch,setFreeSearch] = React.useState("");
  const [freeFilter,setFreeFilter] = React.useState("Alle");
  const [s,setS] = React.useState(DEF_STATE);
  const [fbReady,setFbReady] = React.useState(false);
  const [activeRnd,setActiveRnd]=React.useState("groepen");
  const [localPred,setLocalPred]=React.useState("");

  /* Firebase sync */
  React.useEffect(()=>{
    const r = db.ref(REF);
    r.once('value',snap=>{
      if(!snap.val()) r.set(DEF_STATE);
    });
    r.on('value',snap=>{
      if(snap.val()){
        setS(prev=>({...DEF_STATE,...snap.val(),
          sc:{...DEF_STATE.sc,...(snap.val().sc||{})},
          res:{...DEF_STATE.res,...(snap.val().res||{})},
          live:{...DEF_STATE.live,...(snap.val().live||{})},
        }));
        setFbReady(true);
      }
    });
    return ()=>r.off();
  },[]);

  /* write helper */
  const w=(path,val)=>db.ref(`${REF}/${path}`).set(val);
  const wMany=(obj)=>db.ref(REF).update(obj);

  /* Auto-poll live data every 5 min */
  React.useEffect(()=>{
    if(!FD_KEY||FD_KEY==="JOUW_FOOTBALL_DATA_KEY") return;
    const poll=()=>fetchLive();
    poll();
    const id=setInterval(poll,5*60*1000);
    return ()=>clearInterval(id);
  },[]);

  /* helpers */
  const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

  const renderName=(i,size=15)=>{
    const name=s.names[i]||`Speler ${i+1}`;
    const {start,len}=PLAYER_META[i].hl;
    return React.createElement('span',{style:{fontSize:size}},
      name.slice(0,start),
      React.createElement('span',{style:{color:PC[i],fontWeight:600}},name.slice(start,start+len).toUpperCase()),
      name.slice(start+len)
    );
  };

  const CardsIcon=({size=15})=>React.createElement('span',{style:{display:"inline-block",position:"relative",width:size*1.3,height:size,verticalAlign:"middle",flexShrink:0}},
    React.createElement('span',{style:{position:"absolute",left:0,top:0,fontSize:size,lineHeight:1}},"🟨"),
    React.createElement('span',{style:{position:"absolute",left:size*0.45,top:size*0.15,fontSize:size*0.82,lineHeight:1}},"🟥")
  );

  const teamGroup=React.useMemo(()=>{const m={};Object.entries(GROUPS).forEach(([g,ids])=>ids.forEach(id=>m[id]=g));return m;},[]);
  const picks=s.picks||{};
  const pTeams=React.useMemo(()=>[0,1,2].map(i=>TEAMS.filter(t=>picks[t.id]===i)),[picks]);
  const sc=s.sc||DEF_STATE.sc;
  const res=s.res||DEF_STATE.res;

  const tPts=React.useMemo(()=>{
    const m={};
    TEAMS.forEach(t=>{let p=0;
      if((res.r32||[]).includes(t.id))p+=sc.r32;
      if((res.r16||[]).includes(t.id))p+=sc.r16;
      if((res.qf||[]).includes(t.id))p+=sc.qf;
      if((res.sf||[]).includes(t.id))p+=sc.sf;
      if((res.final||[]).includes(t.id))p+=sc.final;
      if(res.champion===t.id)p+=sc.champion;
      m[t.id]=p;});return m;
  },[res,sc]);

  const teamStats=s.teamStats||{};
  const worstTeamInfo=React.useMemo(()=>{
    const drafted=TEAMS.filter(t=>picks[t.id]!==undefined);
    if(!drafted.length)return null;
    return [...drafted].map(t=>({...t,pts:tPts[t.id]||0,gd:(teamStats[t.id]?.gf||0)-(teamStats[t.id]?.ga||0),cards:teamStats[t.id]?.cards||0,player:picks[t.id]}))
      .sort((a,b)=>a.pts!==b.pts?a.pts-b.pts:a.gd!==b.gd?a.gd-b.gd:b.cards-a.cards)[0];
  },[picks,tPts,teamStats]);

  const pScores=React.useMemo(()=>{
    const base=[0,1,2].map(i=>pTeams[i].reduce((sum,t)=>sum+(tPts[t.id]||0),0));
    if(worstTeamInfo!=null){const n=[...base];n[worstTeamInfo.player]+=sc.worst;return n;}
    return base;
  },[pTeams,tPts,worstTeamInfo,sc]);

  const ranking=[0,1,2].map(i=>({i,score:pScores[i]})).sort((a,b)=>b.score-a.score);
  const maxSc=Math.max(...pScores,1);

  /* draft helpers */
  const top9Order=s.draftOrder||[0,1,2];
  const bot3Order=s.draftOrder?[...s.draftOrder].reverse():[2,1,0];
  const curPlayer=s.draftPhase==="top9"?top9Order[s.phaseStep]:s.draftPhase==="bot3"?bot3Order[s.phaseStep]:null;

  const computeLotGroups=(finalPicks)=>{
    const remaining=ODDS_RANK.filter(id=>finalPicks[id]===undefined);
    const groups=[];
    for(let i=0;i<remaining.length;i+=3){
      const grp=remaining.slice(i,i+3);
      const order=shuffle([0,1,2]);
      groups.push(grp.map((teamId,j)=>({teamId,player:order[j]})));
    }
    return groups;
  };

  const pickTeam=tid=>{
    if(s.draftPhase!=="top9"&&s.draftPhase!=="bot3")return;
    const player=curPlayer;
    const newPicks={...picks,[tid]:player};
    if(s.phaseStep<2){
      wMany({picks:newPicks,phaseStep:s.phaseStep+1});
    }else{
      if(s.draftPhase==="top9"){
        wMany({picks:newPicks,draftPhase:"bot3",phaseStep:0});
      }else{
        const groups=computeLotGroups(newPicks);
        wMany({picks:newPicks,lotGroups:groups,draftPhase:"loting",lotStep:0,lotRevealed:false});
      }
    }
  };

  const revealGroup=()=>{
    const group=s.lotGroups[s.lotStep];
    const newPicks={...picks};
    group.forEach(({teamId,player})=>{newPicks[teamId]=player;});
    wMany({picks:newPicks,lotRevealed:true});
  };

  const nextGroup=()=>{
    if(s.lotStep+1>=s.lotGroups.length){w('draftPhase','potPred');}
    else{wMany({lotStep:s.lotStep+1,lotRevealed:false});}
  };

  const randPick=()=>{
    const pool=s.draftPhase==="top9"
      ?TEAMS.filter(t=>picks[t.id]===undefined).map(t=>t.id)
      :BOT3.filter(id=>picks[id]===undefined);
    if(pool.length)pickTeam(pool[Math.floor(Math.random()*pool.length)]);
  };

  const toggleRnd=(rk,tid)=>{
    if(rk==="champion"){w('res/champion',res.champion===tid?null:tid);return;}
    const conf=ROUNDS.find(r=>r.key===rk);
    const cur2=res[rk]||[];
    if(cur2.includes(tid)){
      const nr={...res,[rk]:cur2.filter(id=>id!==tid)};
      ROUNDS.forEach(r=>{if(r.source&&Array.isArray(nr[r.key]))nr[r.key]=nr[r.key].filter(id=>id!==tid);});
      if(nr.champion===tid)nr.champion=null;
      w('res',nr);
    }else if(cur2.length<conf.max){
      w(`res/${rk}`,[...cur2,tid]);
    }
  };

  const elig=rk=>{const conf=ROUNDS.find(r=>r.key===rk);if(!conf.source)return TEAMS;return TEAMS.filter(t=>(res[conf.source]||[]).includes(t.id));};

  /* ── LIVE DATA FETCH ── */
  const fetchLive=async()=>{
    if(!FD_KEY||FD_KEY==="JOUW_FOOTBALL_DATA_KEY")return;
    const headers={"X-Auth-Token":FD_KEY};
    const BASE="https://api.football-data.org/v4";
    const proxy="https://corsproxy.io/?";
    const pfetch=url=>fetch(proxy+encodeURIComponent(url),{headers});
    try{
      const [sRes,mRes,stRes]=await Promise.all([
        pfetch(`${BASE}/competitions/WC/scorers?season=2026`),
        pfetch(`${BASE}/competitions/WC/matches?season=2026`),
        pfetch(`${BASE}/competitions/WC/standings?season=2026`),
      ]);
      const live={...DEF_STATE.live,lastUpdated:new Date().toISOString()};
      /* topscorer */
      if(sRes.ok){
        const sd=await sRes.json();
        if(sd.scorers?.length){
          const top=sd.scorers[0];
          live.topScorerName=`${top.player?.name||""} (${top.team?.name||""})`;
          live.topScorerGoals=top.goals||0;
          live.topScorerTeamId=NAT_MAP[top.team?.name]||null;
        }
      }
      /* matches: cards, goals per team + knockout round advancement */
      if(mRes.ok){
        const md=await mRes.json();
        const matches=md.matches||[];
        const cards={},goals={};
        matches.forEach(m=>{
          [m.homeTeam,m.awayTeam].forEach(t=>{if(!t?.name)return;const id=NAT_MAP[t.name]||t.name;if(!cards[id])cards[id]=0;if(!goals[id])goals[id]={gf:0,ga:0};});
          (m.bookings||[]).forEach(b=>{const id=NAT_MAP[b.team?.name]||b.team?.name;if(id)cards[id]=(cards[id]||0)+(b.card==="RED_CARD"?2:1);});
          if(m.score?.fullTime&&m.status==="FINISHED"){
            const hi=NAT_MAP[m.homeTeam?.name]||m.homeTeam?.name;
            const ai=NAT_MAP[m.awayTeam?.name]||m.awayTeam?.name;
            const hg=m.score.fullTime.home||0,ag=m.score.fullTime.away||0;
            if(hi){goals[hi].gf+=hg;goals[hi].ga+=ag;}
            if(ai){goals[ai].gf+=ag;goals[ai].ga+=hg;}
          }
        });
        const sorted=Object.entries(cards).sort((a,b)=>b[1]-a[1]);
        if(sorted.length){live.mostCardsTeamId=sorted[0][0];live.mostCardsCount=sorted[0][1];}
        /* update teamStats */
        const newStats={};
        Object.keys({...cards,...goals}).forEach(id=>{newStats[id]={gf:goals[id]?.gf||0,ga:goals[id]?.ga||0,cards:cards[id]||0};});
        w('teamStats',newStats);
        /* store simplified match list for Uitslag page */
        const stageNames={GROUP_STAGE:"Groepsfase",ROUND_OF_32:"R32",ROUND_OF_16:"R16",QUARTER_FINALS:"Kwartfinale",SEMI_FINALS:"Halve finale",FINAL:"Finale"};
        live.matchList=matches.slice(0,200).map(m=>({
          id:m.id,
          date:m.utcDate?.slice(0,10)||"",
          time:m.utcDate?.slice(11,16)||"",
          stage:stageNames[m.stage]||m.stage,
          group:m.group?.replace("GROUP_","")||"",
          status:m.status,
          home:NAT_MAP[m.homeTeam?.name]||"",
          away:NAT_MAP[m.awayTeam?.name]||"",
          homeName:m.homeTeam?.name||"",
          awayName:m.awayTeam?.name||"",
          hs:m.score?.fullTime?.home??null,
          as:m.score?.fullTime?.away??null,
          goals:(m.goals||[]).map(g=>({min:g.minute,scorer:g.scorer?.name||"",teamId:NAT_MAP[g.team?.name]||""})),
          cards:(m.bookings||[]).map(b=>({min:b.minute,player:b.player?.name||"",teamId:NAT_MAP[b.team?.name]||"",type:b.card==="RED_CARD"?"R":"Y"})),
        }));
        /* group standings */
        const newRes={...res};
        const finished=matches.filter(m=>m.status==="FINISHED");
        if(stRes.ok){
          const stad=await stRes.json();
          const newStandings={};
          const r32teams=[];
          (stad.standings||[]).forEach(grp=>{
            if(grp.type==="TOTAL"){
              const letter=grp.group?.replace("GROUP_","")||"";
              newStandings[letter]=(grp.table||[]).map(row=>({
                id:NAT_MAP[row.team?.name]||row.team?.name,
                p:row.playedGames,w:row.won,d:row.draw,l:row.lost,
                gf:row.goalsFor,ga:row.goalsAgainst,pts:row.points
              }));
              (grp.table||[]).slice(0,2).forEach(row=>{const id=NAT_MAP[row.team?.name];if(id)r32teams.push(id);});
            }
          });
          live.groupStandings=newStandings;
          if(r32teams.length>0)newRes.r32=r32teams;
        }
        /* knockout rounds */
        const roundMap={ROUND_OF_16:"r16",QUARTER_FINALS:"qf",SEMI_FINALS:"sf",FINAL:"champion"};
        finished.forEach(m=>{
          const rKey=roundMap[m.stage];if(!rKey)return;
          const winner=m.score?.winner;if(!winner)return;
          const winId=NAT_MAP[winner==="HOME_TEAM"?m.homeTeam?.name:m.awayTeam?.name];if(!winId)return;
          if(rKey==="champion"){newRes.champion=winId;}
          else{const arr=newRes[rKey]||[];if(!arr.includes(winId))newRes[rKey]=[...arr,winId];}
        });
        w('res',newRes);
        if(live.topScorerTeamId)w('res/topScorer',live.topScorerTeamId);
        if(live.mostCardsTeamId)w('res/mostCards',live.mostCardsTeamId);
      }
      w('live',live);
      setApiStatus({ok:true,msg:`Live bijgewerkt v ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`});
      /* try to fetch player of tournament from Wikipedia */
      fetchBestPlayer();
    }catch(e){setApiStatus({ok:false,msg:e.message||"Fout bij ophalen"});}
  };

  const fetchBestPlayer=async()=>{
    try{
      const r=await fetch("https://en.wikipedia.org/w/api.php?action=query&titles=2026_FIFA_World_Cup&prop=revisions&rvprop=content&rvsection=0&format=json&origin=*");
      const d=await r.json();
      const pages=d.query?.pages||{};
      const content=Object.values(pages)[0]?.revisions?.[0]?.['*']||"";
      /* look for Golden Ball / Best Player */
